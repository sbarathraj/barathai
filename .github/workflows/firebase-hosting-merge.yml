# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build with secret env
        env:
          VITE_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VITE_OPENROUTER_API_KEY2: ${{ secrets.OPENROUTER_API_KEY2 }}
          VITE_OPENROUTER_API_URL2: ${{ secrets.OPENROUTER_API_URL2 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_ALERT_TO: ${{ secrets.GMAIL_ALERT_TO }}
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BARATHAI }}

      - name: Deploy to Firebase Hosting
        run: |
          export FIREBASE_TOKEN=$(gcloud auth print-access-token)
          set +e
          npx firebase-tools@latest deploy --only hosting --project barathai --non-interactive 2>&1 | tee /tmp/deploy_out.txt
          DEPLOY_CODE=${PIPESTATUS[0]}
          set -e
          if grep -q "is the current active version" /tmp/deploy_out.txt; then
            echo "✅ Already up to date — no new changes to deploy."
            exit 0
          fi
          exit $DEPLOY_CODE

